<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Editorial — Dra. Yasmim Meneses</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCpMu7V43IrtKhyYMXFlcz7VKhdvXZ2tYw",
    authDomain: "paleta-yasmim.firebaseapp.com",
    projectId: "paleta-yasmim",
    storageBucket: "paleta-yasmim.firebasestorage.app",
    messagingSenderId: "653028129243",
    appId: "1:653028129243:web:d1e2b021489ba023180ffe"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const postsCol = collection(db, 'posts');

  window._db = db;
  window._postsCol = postsCol;
  window._fsdk = { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, writeBatch };

  window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ivory: #F8F5F0; --cream: #EDE9E1; --gold: #B8956A; --gold-light: #E8D8C0;
    --gold-dark: #8B6C45; --text: #1E1A16; --text-muted: #7A6E63; --text-light: #A8998C;
    --reel-color: #C97B84; --reel-bg: #F5E8EA;
    --carousel-color: #6B8F71; --carousel-bg: #E6EFE7;
    --static-color: #6B7FAF; --static-bg: #E7EBF5;
    --border: rgba(184,149,106,0.25); --border-strong: rgba(184,149,106,0.5);
    --radius: 12px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--ivory); color: var(--text); min-height: 100vh; }

  header {
    background: var(--text); padding: 28px 48px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--gold-light); letter-spacing: 0.04em; }
  .header-left p { font-size: 11px; color: var(--text-light); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .view-toggle { display: flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
  .view-btn { padding: 8px 18px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text-light); background: none; border: none; cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em; text-transform: uppercase; }
  .view-btn.active { background: var(--gold); color: var(--text); }

  .btn-add { display: flex; align-items: center; gap: 7px; padding: 9px 20px; background: var(--gold); color: var(--text); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s; }
  .btn-add:hover { background: var(--gold-dark); color: #fff; }

  .lock-btn { background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; width: 38px; height: 38px; cursor: pointer; color: var(--text-light); display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 16px; }
  .lock-btn:hover { border-color: var(--gold); color: var(--gold); }
  .lock-btn.unlocked { border-color: var(--gold); color: var(--gold); }

  .admin-badge { font-size: 10px; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.8; }

  main { padding: 40px 48px 80px; max-width: 1200px; margin: 0 auto; }

  .month-nav { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
  .month-nav button { background: none; border: 1px solid var(--border-strong); border-radius: 8px; width: 36px; height: 36px; cursor: pointer; color: var(--text-muted); font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .month-nav button:hover { border-color: var(--gold); color: var(--gold); }
  .month-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; }
  .month-count { margin-left: auto; font-size: 12px; color: var(--text-light); letter-spacing: 0.08em; text-transform: uppercase; }

  .legend { display: flex; gap: 20px; margin-bottom: 32px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }

  .post-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: box-shadow 0.2s, transform 0.2s; cursor: pointer; }
  .post-card:hover { box-shadow: 0 8px 32px rgba(30,26,22,0.14); transform: translateY(-2px); }

  .card-image-placeholder { aspect-ratio: 4/5; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-light); }
  .card-image-placeholder svg { width: 28px; height: 28px; opacity: 0.4; }
  .card-image-placeholder span { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

  .card-type-badge { position: absolute; top: 12px; left: 12px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .type-reel .card-type-badge { background: var(--reel-bg); color: var(--reel-color); }
  .type-carousel .card-type-badge { background: var(--carousel-bg); color: var(--carousel-color); }
  .type-static .card-type-badge { background: var(--static-bg); color: var(--static-color); }

  .card-body { padding: 16px 18px 18px; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-date { font-size: 11px; color: var(--text-light); letter-spacing: 0.06em; text-transform: uppercase; }
  .card-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
  .post-card:hover .card-actions { opacity: 1; }
  .card-action-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .card-action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .card-action-btn.danger:hover { border-color: var(--reel-color); color: var(--reel-color); }
  .card-caption { font-size: 13px; color: var(--text); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .cal-header { background: var(--cream); padding: 10px 8px; font-size: 10px; font-weight: 500; color: var(--text-muted); text-align: center; letter-spacing: 0.1em; text-transform: uppercase; }
  .cal-day { background: #fff; min-height: 110px; padding: 10px 8px; }
  .cal-day.empty { background: var(--ivory); }
  .cal-day-num { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .cal-day.today .cal-day-num { background: var(--gold); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .cal-post-chip { border-left: 3px solid var(--reel-color); background: var(--reel-bg); border-radius: 4px; padding: 4px 7px; margin-bottom: 4px; font-size: 10px; cursor: pointer; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-post-chip:hover { opacity: 0.75; }
  .cal-post-chip.carousel { background: var(--carousel-bg); border-left-color: var(--carousel-color); }
  .cal-post-chip.static { background: var(--static-bg); border-left-color: var(--static-color); }

  .empty-state { text-align: center; padding: 80px 40px; color: var(--text-light); }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 16px; }

  .loading { text-align: center; padding: 80px 40px; color: var(--text-light); font-size: 14px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(30,26,22,0.6); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(30,26,22,0.25); }
  .modal-header { padding: 24px 28px 0; display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 22px; line-height: 1; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 0 28px 28px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; }
  input[type="text"], input[type="date"], input[type="url"], input[type="password"], select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--ivory); outline: none; transition: border-color 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); background: #fff; }
  textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding-top: 6px; }
  .btn-cancel { padding: 10px 22px; background: none; border: 1px solid var(--border-strong); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-muted); cursor: pointer; }
  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-save { padding: 10px 28px; background: var(--gold); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; }
  .btn-save:hover { background: var(--gold-dark); color: #fff; }
  .img-preview-wrap { width: 100%; aspect-ratio: 4/5; max-height: 220px; border-radius: 8px; overflow: hidden; background: var(--cream); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-light); font-size: 12px; }
  .img-preview-wrap img { width: 100%; height: 100%; object-fit: contain; }

  .pwd-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(30,26,22,0.7); z-index: 300; align-items: center; justify-content: center; }
  .pwd-modal-overlay.open { display: flex; }
  .pwd-modal { background: #fff; border-radius: 16px; padding: 36px; width: 340px; text-align: center; box-shadow: 0 24px 60px rgba(30,26,22,0.3); }
  .pwd-modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 8px; }
  .pwd-modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .pwd-error { color: var(--reel-color); font-size: 12px; margin-top: 8px; display: none; }

  /* VIEW MODAL */
  .view-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(30,26,22,0.75); z-index: 200; align-items: flex-end; justify-content: center; }
  .view-modal-overlay.open { display: flex; }
  .view-modal {
    background: #fff; width: 100%; max-width: 480px; max-height: 92vh;
    border-radius: 20px 20px 0 0; overflow: hidden;
    display: flex; flex-direction: column;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .view-modal-img {
    width: 100%; background: #1E1A16;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; max-height: 52vw;
    overflow: hidden;
  }
  .view-modal-img img { width: 100%; height: auto; display: block; object-fit: contain; }
  .view-modal-img-placeholder { aspect-ratio: 4/5; max-height: 220px; width: 100%; background: var(--cream); display: flex; align-items: center; justify-content: center; color: var(--text-light); font-size: 12px; }
  .view-modal-body { padding: 20px 24px 32px; overflow-y: auto; flex: 1; }
  .view-modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .view-modal-type { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .view-modal-date { font-size: 11px; color: var(--text-light); letter-spacing: 0.06em; text-transform: uppercase; }
  .view-modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 12px; line-height: 1.3; }
  .view-modal-caption { font-size: 14px; color: var(--text-muted); line-height: 1.75; white-space: pre-wrap; }
  .view-modal-close { position: absolute; top: 14px; right: 14px; background: rgba(30,26,22,0.5); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .view-modal-close:hover { background: rgba(30,26,22,0.8); }
  .view-modal-drag { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 10px auto 0; }

  @media (min-width: 600px) {
    .view-modal-overlay { align-items: center; }
    .view-modal { border-radius: 20px; max-height: 88vh; }
    .view-modal-img { max-height: 320px; }
  }

  @media (max-width: 768px) {
    header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-size: 18px; }
    .header-right { gap: 8px; flex-wrap: wrap; }
    .view-btn { padding: 7px 12px; font-size: 11px; }
    .btn-add { padding: 8px 14px; font-size: 11px; }
    main { padding: 20px 16px 60px; }
    .month-nav { gap: 12px; margin-bottom: 20px; }
    .month-title { font-size: 24px; }
    .legend { gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .posts-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row { grid-template-columns: 1fr; }
    .modal { border-radius: 12px; }
    .modal-header { padding: 20px 20px 0; }
    .modal-body { padding: 0 20px 20px; }
    .calendar-grid { font-size: 10px; }
    .cal-day { min-height: 70px; padding: 6px 4px; }
    .cal-day-num { font-size: 10px; }
    .cal-post-chip { font-size: 9px; padding: 3px 4px; }
    .card-body { padding: 12px 14px 14px; }
    .card-caption { -webkit-line-clamp: 2; }
  }

  @media (max-width: 420px) {
    .posts-grid { grid-template-columns: 1fr; }
    header { padding: 14px 16px; }
    .month-title { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Dra. Yasmim Meneses</h1>
    <p>Calendário Editorial · Paleta Mkt</p>
  </div>
  <div class="header-right">
    <span class="admin-badge" id="admin-badge" style="display:none">● Modo edição</span>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('grid')" id="btn-grid">Grade</button>
      <button class="view-btn" onclick="setView('calendar')" id="btn-calendar">Calendário</button>
    </div>
    <button class="btn-add" id="btn-add" onclick="openModal()" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo post
    </button>
    <button class="lock-btn" id="lock-btn" onclick="toggleAdmin()" title="Modo edição">
      <svg id="lock-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <h2 class="month-title" id="month-title">Junho 2026</h2>
    <button onclick="changeMonth(1)">&#8250;</button>
    <span class="month-count" id="month-count"></span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--reel-color)"></div> Reel</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--carousel-color)"></div> Carrossel</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--static-color)"></div> Static</div>
  </div>
  <div id="view-grid">
    <div class="loading" id="loading">Carregando posts...</div>
    <div class="posts-grid" id="posts-grid" style="display:none"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <p>Nenhum post neste mês.</p>
    </div>
  </div>
  <div id="view-calendar" style="display:none">
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</main>

<!-- MODAL EDIÇÃO -->
<div class="modal-overlay" id="modal-overlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title-text">Novo post</h3>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <div class="img-preview-wrap" id="img-preview">
          <span style="font-size:12px;color:var(--text-light)">Pré-visualização da imagem</span>
        </div>
        <label>Imagem</label>
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">
          <label for="f-upload" style="all:unset;display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--gold);color:var(--text);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:0.04em;white-space:nowrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Fazer upload
          </label>
          <input type="file" id="f-upload" accept="image/*" style="display:none" onchange="handleUpload(this)">
          <span style="font-size:11px;color:var(--text-light)">ou cole uma URL</span>
        </div>
        <input type="url" id="f-image" placeholder="https://..." oninput="previewImage(this.value)">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tipo de conteúdo</label>
          <select id="f-type">
            <option value="reel">Reel</option>
            <option value="carousel">Carrossel</option>
            <option value="static">Static</option>
          </select>
        </div>
        <div class="form-group">
          <label>Data de publicação</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div class="form-group">
        <label>Título / gancho</label>
        <input type="text" id="f-title" placeholder="Ex: O que ninguém te conta sobre implantes...">
      </div>
      <div class="form-group">
        <label>Legenda</label>
        <textarea id="f-caption" placeholder="Cole aqui a legenda completa do post..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="savePost()">Salvar post</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL VISUALIZAÇÃO -->
<div class="view-modal-overlay" id="view-modal-overlay" onclick="closeViewOnOverlay(event)">
  <div class="view-modal" id="view-modal">
    <div class="view-modal-drag"></div>
    <div style="position:relative">
      <div class="view-modal-img" id="view-modal-img"></div>
      <button class="view-modal-close" onclick="closeViewModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="view-modal-body">
      <div class="view-modal-top">
        <span class="view-modal-type" id="view-modal-type"></span>
        <span class="view-modal-date" id="view-modal-date"></span>
      </div>
      <p class="view-modal-title" id="view-modal-title"></p>
      <p class="view-modal-caption" id="view-modal-caption"></p>
    </div>
  </div>
</div>

<!-- MODAL SENHA -->
<div class="pwd-modal-overlay" id="pwd-modal-overlay" onclick="closePwdOnOverlay(event)">
  <div class="pwd-modal">
    <h3>Modo edição</h3>
    <p>Digite a senha para desbloquear</p>
    <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
    <p class="pwd-error" id="pwd-error">Senha incorreta</p>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:center">
      <button class="btn-cancel" onclick="closePwdModal()">Cancelar</button>
      <button class="btn-save" onclick="checkPassword()">Entrar</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'paleta2026';
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let db, postsRef;

let posts = [];
const _now = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Manaus' }));
let currentMonth = _now.getMonth();
let currentYear = _now.getFullYear();
let currentView = 'grid';
let editingId = null;
let isAdmin = false;

const DEFAULT_POSTS = [
  { type: 'reel', date: '2026-06-02', title: 'Você cuida de tudo — menos do seu sorriso', caption: 'Você organiza a vida inteira. A casa, o trabalho, os filhos. E o sorriso? Vai adiando. É por isso que aqui a gente não espera a dor chegar pra agir.', image: '' },
  { type: 'carousel', date: '2026-06-05', title: '3 sinais que seu corpo já está pedindo um implante', caption: 'Dor ao mastigar. Dente que balança. Brecha no sorriso que você tenta esconder. Esses três sinais têm solução — e ela é mais acessível do que você imagina.', image: '' },
  { type: 'static', date: '2026-06-07', title: 'Biomimética: a odontologia que respeita o que já é seu', caption: 'Devolver o que o dente perdeu com o material mais próximo da natureza possível. Isso é biomimética. Isso é o que eu faço aqui.', image: '' },
  { type: 'reel', date: '2026-06-09', title: 'O que acontece na sua boca quando você ignora', caption: 'Um dente ausente afeta a mastigação, a fala, a postura e a autoestima. O tempo não resolve. Mas a reabilitação oral sim.', image: '' },
  { type: 'carousel', date: '2026-06-12', title: 'Reabilitação oral: como é o caminho na prática', caption: 'Da avaliação ao resultado final — passo a passo do que acontece quando você decide cuidar do seu sorriso de verdade.', image: '' },
  { type: 'static', date: '2026-06-14', title: 'Prótese fixa muda mais do que o sorriso', caption: 'Muda a forma como você come, como você fala, como você aparece no mundo. E como você se sente com você mesma.', image: '' },
  { type: 'reel', date: '2026-06-17', title: 'A diferença entre ir ao dentista por dor — e por escolha', caption: 'Uma é reativa. A outra é estratégica. É por isso que aqui a gente trabalha prevenção antes de urgência.', image: '' },
  { type: 'carousel', date: '2026-06-19', title: '5 mitos sobre implante dentário (e o que é verdade)', caption: 'Dói muito? Demora anos? É caro demais? Cada um desses mitos tem uma resposta — e ela provavelmente é diferente do que você ouviu.', image: '' },
  { type: 'static', date: '2026-06-21', title: 'Seu sorriso é um investimento, não um gasto', caption: 'Quando você entende que saúde bucal afeta sua saúde sistêmica, sua autoestima e sua presença, a perspectiva muda.', image: '' },
  { type: 'reel', date: '2026-06-24', title: 'Reabilitação oral não é luxo. É qualidade de vida.', caption: 'É poder comer sem dor. É sorrir sem esconder. É se sentir inteira. É por isso que aqui a gente trata cada caso como único.', image: '' }
];

const typeBadgeStyle = {
  reel: 'background:var(--reel-bg);color:var(--reel-color)',
  carousel: 'background:var(--carousel-bg);color:var(--carousel-color)',
  static: 'background:var(--static-bg);color:var(--static-color)'
};

function viewPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;

  const imgWrap = document.getElementById('view-modal-img');
  if (p.image) {
    imgWrap.innerHTML = `<img src="${p.image}" alt="" style="width:100%;height:auto;display:block;object-fit:contain">`;
    imgWrap.style.display = 'flex';
  } else {
    imgWrap.style.display = 'none';
  }

  const typeEl = document.getElementById('view-modal-type');
  typeEl.textContent = typeLabel(p.type);
  typeEl.style.cssText = typeBadgeStyle[p.type] || '';

  document.getElementById('view-modal-date').textContent = formatDate(p.date);
  document.getElementById('view-modal-title').textContent = p.title;
  document.getElementById('view-modal-caption').textContent = p.caption;

  document.getElementById('view-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeViewModal() {
  document.getElementById('view-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeViewOnOverlay(e) {
  if (e.target === document.getElementById('view-modal-overlay')) closeViewModal();
}

async function loadData() {
  try {
    posts = await window._loadPosts();
  } catch (e) {
    console.error('Firebase error:', e);
    posts = DEFAULT_POSTS.map((p, i) => ({ id: String(i), ...p }));
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('posts-grid').style.display = 'grid';
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('view-grid').style.display = v === 'grid' ? 'block' : 'none';
  document.getElementById('view-calendar').style.display = v === 'calendar' ? 'block' : 'none';
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-calendar').classList.toggle('active', v === 'calendar');
  render();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
}

function getMonthPosts() {
  return posts.filter(p => {
    const d = new Date(p.date + 'T12:00:00');
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  }).sort((a, b) => a.date.localeCompare(b.date));
}

function typeLabel(t) { return { reel: 'Reel', carousel: 'Carrossel', static: 'Static' }[t] || t; }
function formatDate(s) { return new Date(s + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).toUpperCase(); }

const typeBarColor = { reel: 'var(--reel-color)', carousel: 'var(--carousel-color)', static: 'var(--static-color)' };

function renderGrid() {
  const mp = getMonthPosts();
  const grid = document.getElementById('posts-grid');
  const empty = document.getElementById('empty-state');
  if (mp.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = mp.map(p => `
    <div class="post-card type-${p.type}" onclick="isAdmin ? openModal('${p.id}') : viewPost('${p.id}')">
      <div style="height:5px;background:${typeBarColor[p.type]};border-radius:var(--radius) var(--radius) 0 0"></div>
      <div style="position:relative">
        ${p.image
          ? `<div style="width:100%;background:#1E1A16;display:flex;align-items:center;justify-content:center;overflow:hidden"><img src="${p.image}" alt="" style="width:100%;height:auto;display:block"></div>`
          : `<div class="card-image-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Sem imagem</span></div>`
        }
        <span class="card-type-badge">${typeLabel(p.type)}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-date">${formatDate(p.date)}</span>
          ${isAdmin ? `
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="card-action-btn" title="Editar" onclick="openModal('${p.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="card-action-btn danger" title="Excluir" onclick="deletePost('${p.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>` : ''}
        </div>
        <p style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4">${p.title}</p>
        <p class="card-caption">${p.caption}</p>
      </div>
    </div>
  `).join('');
}

function renderCalendar() {
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();
  const mp = getMonthPosts();
  let html = DAYS_PT.map(d => `<div class="cal-header">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const isToday = today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
    const chips = mp.filter(p => new Date(p.date + 'T12:00:00').getDate() === day)
      .map(p => `<div class="cal-post-chip ${p.type}" onclick="isAdmin ? openModal('${p.id}') : viewPost('${p.id}')" title="${p.title}">${p.title}</div>`).join('');
    html += `<div class="cal-day ${isToday ? 'today' : ''}"><div class="cal-day-num">${day}</div>${chips}</div>`;
  }
  document.getElementById('calendar-grid').innerHTML = html;
}

function render() {
  const mp = getMonthPosts();
  document.getElementById('month-title').textContent = `${MONTHS_PT[currentMonth]} ${currentYear}`;
  document.getElementById('month-count').textContent = `${mp.length} post${mp.length !== 1 ? 's' : ''}`;
  if (currentView === 'grid') renderGrid();
  else renderCalendar();
}

function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    updateAdminUI();
  } else {
    document.getElementById('pwd-modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('pwd-input').focus(), 100);
  }
}

function checkPassword() {
  const val = document.getElementById('pwd-input').value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    closePwdModal();
    updateAdminUI();
    render();
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

function updateAdminUI() {
  document.getElementById('btn-add').style.display = isAdmin ? 'flex' : 'none';
  document.getElementById('admin-badge').style.display = isAdmin ? 'inline' : 'none';
  const lockBtn = document.getElementById('lock-btn');
  lockBtn.classList.toggle('unlocked', isAdmin);
  lockBtn.title = isAdmin ? 'Sair do modo edição' : 'Modo edição';
  document.getElementById('lock-icon').innerHTML = isAdmin
    ? '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>'
    : '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
}

function closePwdModal() {
  document.getElementById('pwd-modal-overlay').classList.remove('open');
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error').style.display = 'none';
}

function closePwdOnOverlay(e) { if (e.target === document.getElementById('pwd-modal-overlay')) closePwdModal(); }

function openModal(id = null) {
  if (!isAdmin) return;
  editingId = id;
  const wrap = document.getElementById('img-preview');
  wrap._uploadedBase64 = null;
  wrap.style.aspectRatio = '4/5';

  if (id) {
    const p = posts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modal-title-text').textContent = 'Editar post';
    document.getElementById('f-type').value = p.type;
    document.getElementById('f-date').value = p.date;
    document.getElementById('f-title').value = p.title;
    document.getElementById('f-caption').value = p.caption;
    document.getElementById('f-image').value = '';
    if (p.image) { wrap.innerHTML = `<img src="${p.image}" alt="">`; wrap._uploadedBase64 = p.image; }
    else wrap.innerHTML = '<span style="font-size:12px;color:var(--text-light)">Pré-visualização da imagem</span>';
  } else {
    document.getElementById('modal-title-text').textContent = 'Novo post';
    document.getElementById('f-type').value = 'reel';
    document.getElementById('f-date').value = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-01`;
    document.getElementById('f-title').value = '';
    document.getElementById('f-caption').value = '';
    document.getElementById('f-image').value = '';
    wrap.innerHTML = '<span style="font-size:12px;color:var(--text-light)">Pré-visualização da imagem</span>';
  }
  document.getElementById('f-upload').value = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId = null; }
function closeOnOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const TW = 480, TH = 600;
      const canvas = document.createElement('canvas');
      canvas.width = TW; canvas.height = TH;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1E1A16';
      ctx.fillRect(0, 0, TW, TH);
      const scale = Math.min(TW / img.naturalWidth, TH / img.naturalHeight);
      const dw = Math.round(img.naturalWidth * scale);
      const dh = Math.round(img.naturalHeight * scale);
      ctx.drawImage(img, Math.round((TW - dw) / 2), Math.round((TH - dh) / 2), dw, dh);
      const resized = canvas.toDataURL('image/jpeg', 0.82);
      const wrap = document.getElementById('img-preview');
      wrap._uploadedBase64 = resized;
      wrap.innerHTML = `<img src="${resized}" alt="" style="width:100%;height:100%;object-fit:contain">`;
      document.getElementById('f-image').value = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function previewImage(url) {
  const wrap = document.getElementById('img-preview');
  wrap._uploadedBase64 = null;
  if (url) wrap.innerHTML = `<img src="${url}" alt="" onerror="this.parentElement.innerHTML='<span style=font-size:12px>URL inválida</span>'">`;
  else wrap.innerHTML = '<span style="font-size:12px;color:var(--text-light)">Pré-visualização da imagem</span>';
}

async function savePost() {
  const wrap = document.getElementById('img-preview');
  const data = {
    type: document.getElementById('f-type').value,
    date: document.getElementById('f-date').value,
    title: document.getElementById('f-title').value.trim(),
    caption: document.getElementById('f-caption').value.trim(),
    image: wrap._uploadedBase64 || document.getElementById('f-image').value.trim()
  };
  if (!data.title || !data.date) { alert('Preencha ao menos o título e a data.'); return; }
  try {
    if (editingId) {
      await window._save(editingId, data);
      const idx = posts.findIndex(x => x.id === editingId);
      posts[idx] = { id: editingId, ...data };
    } else {
      const ref = await window._save(null, data);
      posts.push({ id: ref.id, ...data });
    }
    closeModal();
    render();
  } catch(e) { alert('Erro ao salvar. Verifique sua conexão.'); }
}

async function deletePost(id) {
  if (!confirm('Excluir este post?')) return;
  try {
    await window._delete(id);
    posts = posts.filter(p => p.id !== id);
    render();
  } catch(e) { alert('Erro ao excluir.'); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closePwdModal(); closeViewModal(); }
});

window.addEventListener('firebase-ready', () => {
  const { getDocs, addDoc, updateDoc, deleteDoc, doc, writeBatch } = window._fsdk;
  db = window._db;
  postsRef = window._postsCol;

  window._save = async (editingId, data) => {
    if (editingId) {
      await updateDoc(doc(db, 'posts', editingId), data);
    } else {
      return await addDoc(postsRef, data);
    }
  };

  window._delete = async (id) => {
    await deleteDoc(doc(db, 'posts', id));
  };

  window._loadPosts = async () => {
    const snap = await getDocs(postsRef);
    if (snap.empty) {
      const batch = writeBatch(db);
      DEFAULT_POSTS.forEach(p => { const ref = doc(postsRef); batch.set(ref, p); });
      await batch.commit();
      const snap2 = await getDocs(postsRef);
      return snap2.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  };

  loadData();
});
</script>
