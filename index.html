<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Editorial — Dra. Yasmim Meneses</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory: #F8F5F0;
    --cream: #EDE9E1;
    --gold: #B8956A;
    --gold-light: #E8D8C0;
    --gold-dark: #8B6C45;
    --text: #1E1A16;
    --text-muted: #7A6E63;
    --text-light: #A8998C;
    --reel-color: #C97B84;
    --reel-bg: #F5E8EA;
    --carousel-color: #6B8F71;
    --carousel-bg: #E6EFE7;
    --static-color: #6B7FAF;
    --static-bg: #E7EBF5;
    --border: rgba(184,149,106,0.25);
    --border-strong: rgba(184,149,106,0.5);
    --shadow: 0 2px 20px rgba(30,26,22,0.08);
    --shadow-hover: 0 8px 32px rgba(30,26,22,0.14);
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ivory);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--text);
    padding: 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }

  .header-left p {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .view-toggle {
    display: flex;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    overflow: hidden;
  }

  .view-btn {
    padding: 8px 18px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: var(--text-light);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .view-btn.active {
    background: var(--gold);
    color: var(--text);
  }

  .btn-add {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 20px;
    background: var(--gold);
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }

  .btn-add:hover { background: var(--gold-dark); color: #fff; }
  .btn-add svg { width: 14px; height: 14px; }

  /* MAIN */
  main { padding: 40px 48px 80px; max-width: 1200px; margin: 0 auto; }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  .month-nav button {
    background: none;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .month-nav button:hover { border-color: var(--gold); color: var(--gold); }

  .month-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .month-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* CALENDAR VIEW */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .cal-header {
    background: var(--cream);
    padding: 10px 8px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .cal-day {
    background: #fff;
    min-height: 110px;
    padding: 10px 8px;
    position: relative;
    transition: background 0.15s;
  }

  .cal-day.empty { background: var(--ivory); }
  .cal-day.today { background: #FFFBF6; }

  .cal-day-num {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-bottom: 6px;
  }

  .cal-day.today .cal-day-num {
    background: var(--gold);
    color: #fff;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .cal-post-chip {
    background: var(--reel-bg);
    border-left: 3px solid var(--reel-color);
    border-radius: 4px;
    padding: 4px 7px;
    margin-bottom: 4px;
    font-size: 10px;
    color: var(--text);
    cursor: pointer;
    transition: opacity 0.15s;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cal-post-chip:hover { opacity: 0.75; }
  .cal-post-chip.carousel { background: var(--carousel-bg); border-left-color: var(--carousel-color); }
  .cal-post-chip.static { background: var(--static-bg); border-left-color: var(--static-color); }

  /* GRID VIEW */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .post-card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .post-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  .card-image {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-image-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-light);
  }

  .card-image-placeholder svg { width: 32px; height: 32px; opacity: 0.5; }
  .card-image-placeholder span { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

  .card-type-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card-body { padding: 16px 18px 18px; }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .card-date {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .post-card:hover .card-actions { opacity: 1; }

  .card-action-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 13px;
  }

  .card-action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .card-action-btn.danger:hover { border-color: var(--reel-color); color: var(--reel-color); }

  .card-caption {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* TYPE COLORS */
  .type-reel .card-type-badge { background: var(--reel-bg); color: var(--reel-color); }
  .type-carousel .card-type-badge { background: var(--carousel-bg); color: var(--carousel-color); }
  .type-static .card-type-badge { background: var(--static-bg); color: var(--static-color); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,26,22,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 60px rgba(30,26,22,0.25);
  }

  .modal-header {
    padding: 24px 28px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-light);
    font-size: 22px;
    line-height: 1;
    padding: 4px;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 0 28px 28px; }

  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  input[type="text"],
  input[type="date"],
  input[type="url"],
  select,
  textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--ivory);
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    background: #fff;
  }

  textarea { min-height: 100px; resize: vertical; line-height: 1.6; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding-top: 6px;
  }

  .btn-cancel {
    padding: 10px 22px;
    background: none;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-save {
    padding: 10px 28px;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-save:hover { background: var(--gold-dark); color: #fff; }

  /* IMAGE PREVIEW IN MODAL */
  .img-preview-wrap {
    width: 100%;
    aspect-ratio: 1;
    max-height: 200px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--cream);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-light);
    font-size: 12px;
  }

  .img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--text-light);
  }

  .empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  @media (max-width: 768px) {
    header { padding: 20px 24px; }
    main { padding: 28px 24px 60px; }
    .posts-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Dra. Yasmim Meneses</h1>
    <p>Calendário Editorial · Paleta Mkt</p>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('grid')" id="btn-grid">Grade</button>
      <button class="view-btn" onclick="setView('calendar')" id="btn-calendar">Calendário</button>
    </div>
    <button class="btn-add" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo post
    </button>
  </div>
</header>

<main>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <h2 class="month-title" id="month-title">Junho 2026</h2>
    <button onclick="changeMonth(1)">&#8250;</button>
    <span class="month-count" id="month-count"></span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--reel-color)"></div> Reel</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--carousel-color)"></div> Carrossel</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--static-color)"></div> Static</div>
  </div>

  <div id="view-grid">
    <div class="posts-grid" id="posts-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <p>Nenhum post neste mês.<br>Clique em <strong>Novo post</strong> para adicionar.</p>
    </div>
  </div>

  <div id="view-calendar" style="display:none">
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title-text">Novo post</h3>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <div class="img-preview-wrap" id="img-preview">
          <span>Pré-visualização da imagem</span>
        </div>
        <label>URL da imagem (opcional)</label>
        <input type="url" id="f-image" placeholder="https://..." oninput="previewImage(this.value)">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tipo de conteúdo</label>
          <select id="f-type">
            <option value="reel">Reel</option>
            <option value="carousel">Carrossel</option>
            <option value="static">Static</option>
          </select>
        </div>
        <div class="form-group">
          <label>Data de publicação</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div class="form-group">
        <label>Título / gancho</label>
        <input type="text" id="f-title" placeholder="Ex: O que ninguém te conta sobre implantes...">
      </div>
      <div class="form-group">
        <label>Legenda</label>
        <textarea id="f-caption" placeholder="Cole aqui a legenda completa do post..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="savePost()">Salvar post</button>
      </div>
    </div>
  </div>
</div>

<script>
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

const DEFAULT_POSTS = [
  { id: 1, type: 'reel', date: '2026-06-02', title: 'Você cuida de tudo — menos do seu sorriso', caption: 'Você organiza a vida inteira. A casa, o trabalho, os filhos. E o sorriso? Vai adiando. É por isso que aqui a gente não espera a dor chegar pra agir.', image: '' },
  { id: 2, type: 'carousel', date: '2026-06-05', title: '3 sinais que seu corpo já está pedindo um implante', caption: 'Dor ao mastigar. Dente que "balança". Brecha no sorriso que você tenta esconder. Esses três sinais têm solução — e ela é mais acessível do que você imagina.', image: '' },
  { id: 3, type: 'static', date: '2026-06-07', title: 'Biomimética: a odontologia que respeita o que já é seu', caption: 'Devolver o que o dente perdeu com o material mais próximo da natureza possível. Isso é biomimética. Isso é o que eu faço aqui.', image: '' },
  { id: 4, type: 'reel', date: '2026-06-09', title: 'O que acontece na sua boca quando você ignora', caption: 'Um dente ausente afeta a mastigação, a fala, a postura e a autoestima. O tempo não resolve. Mas a reabilitação oral sim.', image: '' },
  { id: 5, type: 'carousel', date: '2026-06-12', title: 'Reabilitação oral: como é o caminho na prática', caption: 'Da avaliação ao resultado final — passo a passo do que acontece quando você decide cuidar do seu sorriso de verdade.', image: '' },
  { id: 6, type: 'static', date: '2026-06-14', title: 'Prótese fixa muda mais do que o sorriso', caption: 'Muda a forma como você come, como você fala, como você aparece no mundo. E como você se sente com você mesma.', image: '' },
  { id: 7, type: 'reel', date: '2026-06-17', title: 'A diferença entre ir ao dentista por dor — e por escolha', caption: 'Uma é reativa. A outra é estratégica. É por isso que aqui a gente trabalha prevenção antes de urgência.', image: '' },
  { id: 8, type: 'carousel', date: '2026-06-19', title: '5 mitos sobre implante dentário (e o que é verdade)', caption: 'Dói muito? Demora anos? É caro demais? Cada um desses mitos tem uma resposta — e ela provavelmente é diferente do que você ouviu.', image: '' },
  { id: 9, type: 'static', date: '2026-06-21', title: 'Seu sorriso é um investimento, não um gasto', caption: 'Quando você entende que saúde bucal afeta sua saúde sistêmica, sua autoestima e sua presença, a perspectiva muda.', image: '' },
  { id: 10, type: 'reel', date: '2026-06-24', title: 'Reabilitação oral não é luxo. É qualidade de vida.', caption: 'É poder comer sem dor. É sorrir sem esconder. É se sentir inteira. É por isso que aqui a gente trata cada caso como único.', image: '' }
];

let posts = [];
let currentMonth = 5; // June = index 5
let currentYear = 2026;
let currentView = 'grid';
let editingId = null;

function loadData() {
  const saved = localStorage.getItem('yasmim-posts');
  posts = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_POSTS));
}

function saveData() {
  localStorage.setItem('yasmim-posts', JSON.stringify(posts));
}

function setView(v) {
  currentView = v;
  document.getElementById('view-grid').style.display = v === 'grid' ? 'block' : 'none';
  document.getElementById('view-calendar').style.display = v === 'calendar' ? 'block' : 'none';
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-calendar').classList.toggle('active', v === 'calendar');
  render();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
}

function getMonthPosts() {
  return posts.filter(p => {
    const d = new Date(p.date + 'T12:00:00');
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  }).sort((a, b) => a.date.localeCompare(b.date));
}

function typeLabel(t) {
  return { reel: 'Reel', carousel: 'Carrossel', static: 'Static' }[t] || t;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}

function renderGrid() {
  const mp = getMonthPosts();
  const grid = document.getElementById('posts-grid');
  const empty = document.getElementById('empty-state');

  if (mp.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = mp.map(p => `
    <div class="post-card type-${p.type}" onclick="openModal(${p.id})">
      <div style="position:relative">
        ${p.image
          ? `<div style="aspect-ratio:1;overflow:hidden"><img src="${p.image}" alt="" onerror="this.parentElement.outerHTML='<div class=card-image-placeholder style=aspect-ratio:1><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg><span>Imagem</span></div>'"></div>`
          : `<div class="card-image-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Sem imagem</span></div>`
        }
        <span class="card-type-badge">${typeLabel(p.type)}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-date">${formatDate(p.date)}</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="card-action-btn" title="Editar" onclick="openModal(${p.id})">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="card-action-btn danger" title="Excluir" onclick="deletePost(${p.id})">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>
        <p style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4">${p.title}</p>
        <p class="card-caption">${p.caption}</p>
      </div>
    </div>
  `).join('');
}

function renderCalendar() {
  const calGrid = document.getElementById('calendar-grid');
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  let html = DAYS_PT.map(d => `<div class="cal-header">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  const mp = getMonthPosts();

  for (let day = 1; day <= daysInMonth; day++) {
    const isToday = today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
    const dayPosts = mp.filter(p => {
      const d = new Date(p.date + 'T12:00:00');
      return d.getDate() === day;
    });

    const chips = dayPosts.map(p => `
      <div class="cal-post-chip ${p.type}" onclick="openModal(${p.id})" title="${p.title}">
        ${p.title}
      </div>
    `).join('');

    html += `
      <div class="cal-day ${isToday ? 'today' : ''}">
        <div class="cal-day-num">${day}</div>
        ${chips}
      </div>
    `;
  }

  calGrid.innerHTML = html;
}

function render() {
  const mp = getMonthPosts();
  document.getElementById('month-title').textContent = `${MONTHS_PT[currentMonth]} ${currentYear}`;
  document.getElementById('month-count').textContent = `${mp.length} post${mp.length !== 1 ? 's' : ''}`;
  if (currentView === 'grid') renderGrid();
  else renderCalendar();
}

function openModal(id = null) {
  editingId = id;
  const modal = document.getElementById('modal-overlay');
  const titleEl = document.getElementById('modal-title-text');

  if (id) {
    const p = posts.find(x => x.id === id);
    if (!p) return;
    titleEl.textContent = 'Editar post';
    document.getElementById('f-type').value = p.type;
    document.getElementById('f-date').value = p.date;
    document.getElementById('f-title').value = p.title;
    document.getElementById('f-caption').value = p.caption;
    document.getElementById('f-image').value = p.image || '';
    previewImage(p.image || '');
  } else {
    titleEl.textContent = 'Novo post';
    document.getElementById('f-type').value = 'reel';
    document.getElementById('f-date').value = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-01`;
    document.getElementById('f-title').value = '';
    document.getElementById('f-caption').value = '';
    document.getElementById('f-image').value = '';
    previewImage('');
  }

  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function convertImageUrl(url) {
  if (!url) return '';
  const gdMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (gdMatch) return `https://drive.google.com/uc?export=view&id=${gdMatch[1]}`;
  return url;
}

function previewImage(url) {
  const wrap = document.getElementById('img-preview');
  const direct = convertImageUrl(url);
  if (direct) {
    wrap.innerHTML = `<img src="${direct}" alt="" onerror="this.parentElement.innerHTML='<span>URL inválida ou imagem sem acesso público</span>'">`;
  } else {
    wrap.innerHTML = '<span>Pré-visualização da imagem</span>';
  }
}

function savePost() {
  const type = document.getElementById('f-type').value;
  const date = document.getElementById('f-date').value;
  const title = document.getElementById('f-title').value.trim();
  const caption = document.getElementById('f-caption').value.trim();
  const image = convertImageUrl(document.getElementById('f-image').value.trim());

  if (!title || !date) {
    alert('Preencha ao menos o título e a data.');
    return;
  }

  if (editingId) {
    const idx = posts.findIndex(x => x.id === editingId);
    posts[idx] = { ...posts[idx], type, date, title, caption, image };
  } else {
    const newId = Date.now();
    posts.push({ id: newId, type, date, title, caption, image });
  }

  saveData();
  closeModal();
  render();
}

function deletePost(id) {
  if (!confirm('Excluir este post?')) return;
  posts = posts.filter(p => p.id !== id);
  saveData();
  render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadData();
render();
</script>
</body>
</html>
